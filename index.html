<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Nerve Block Atlas</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
    width: 100%; height: 100dvh; height: 100%;
    background: #000; color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overflow: hidden;
}
@supports (height: 100dvh) {
    html, body { height: 100dvh; }
}

body {
    display: flex;
    flex-direction: column;
    padding-top: env(safe-area-inset-top, 0px);
    padding-bottom: env(safe-area-inset-bottom, 0px);
}

/* ── Title bar ── */
.title-bar {
    display: flex; align-items: center;
    padding: 6px 12px;
    background: #111; border-bottom: 1px solid #222;
    flex-shrink: 0; z-index: 20;
}
.menu-btn {
    width: 32px; height: 32px; border: none;
    background: none; color: #999; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    border-radius: 6px; margin-right: 8px; flex-shrink: 0;
    touch-action: manipulation;
}
.menu-btn:active { background: #222; }
.menu-btn svg { width: 20px; height: 20px; }
.title-bar h1 {
    font-size: 14px; font-weight: 600; flex: 1;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.title-bar .sub { font-size: 11px; color: #555; font-weight: 400; margin-left: 8px; display: none; }

.title-bar-buttons {
    display: flex; align-items: center; gap: 4px; flex-shrink: 0;
}
.title-bar-btn {
    width: 32px; height: 32px; border: none;
    background: none; color: #999; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    border-radius: 6px; flex-shrink: 0;
    touch-action: manipulation;
    transition: color 0.2s;
}
.title-bar-btn:active { background: #222; }
.title-bar-btn.active { color: #7ab5e8; }
.title-bar-btn svg { width: 20px; height: 20px; }
.title-bar-btn.hidden { display: none; }

/* ── Navigation overlay ── */
.nav-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.7);
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s ease;
}
.nav-overlay.open { opacity: 1; pointer-events: auto; }

.nav-panel {
    position: absolute; top: 0; left: 0; bottom: 0;
    width: min(320px, 85vw);
    background: #111;
    transform: translateX(-100%);
    transition: transform 0.25s ease;
    display: flex; flex-direction: column;
    overflow: hidden;
}
.nav-overlay.open .nav-panel { transform: translateX(0); }

.nav-header {
    display: flex; align-items: center;
    padding: 12px 16px;
    background: #0a0a0a; border-bottom: 1px solid #222;
    flex-shrink: 0;
}
.nav-back {
    width: 32px; height: 32px; border: none;
    background: none; color: #888; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    border-radius: 6px; margin-right: 8px; flex-shrink: 0;
}
.nav-back:active { background: #222; }
.nav-back svg { width: 18px; height: 18px; }
.nav-back.hidden { visibility: hidden; }
.nav-title {
    font-size: 15px; font-weight: 600; flex: 1;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

.nav-list {
    flex: 1; overflow-y: auto;
    -webkit-overflow-scrolling: touch;
}
.nav-item {
    display: flex; align-items: center;
    padding: 14px 16px;
    border-bottom: 1px solid #1a1a1a;
    cursor: pointer; transition: background 0.15s;
    touch-action: manipulation;
}
.nav-item:active { background: #1a1a1a; }
.nav-item.disabled { opacity: 0.35; cursor: default; }
.nav-item.disabled:active { background: transparent; }
.nav-item-text {
    flex: 1; font-size: 15px; color: #ddd;
}
.nav-item.disabled .nav-item-text { color: #555; }
.nav-item-arrow {
    color: #444; font-size: 18px; margin-left: 8px;
}
.nav-item.active-block .nav-item-text { color: #7ab5e8; }
.nav-section-label {
    font-size: 11px; font-weight: 700; color: #555;
    text-transform: uppercase; letter-spacing: 0.5px;
    padding: 12px 16px 8px; margin-top: 4px;
    border-bottom: 1px solid #1a1a1a;
}
.nav-item-star {
    width: 24px; height: 24px; border: none;
    background: none; color: #666; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    margin-left: 8px; flex-shrink: 0; padding: 0;
    transition: color 0.2s;
    touch-action: manipulation;
}
.nav-item-star:active { background: rgba(255,255,255,0.05); }
.nav-item-star.filled { color: #ffd700; }
.nav-item-star svg { width: 16px; height: 16px; }

.nav-item-no-favs {
    padding: 14px 16px; text-align: center;
    font-size: 13px; color: #555; font-style: italic;
    border-bottom: 1px solid #1a1a1a;
}

/* ── Main layout ── */
.main {
    display: flex; flex-direction: column;
    flex: 1; overflow: hidden; min-height: 0;
}

/* ── Icon bar (portrait = horizontal top strip) ── */
.icon-bar {
    display: flex; flex-direction: row;
    align-items: center; justify-content: center;
    gap: 2px;
    padding: 4px 8px;
    background: #0a0a0a;
    border-bottom: 1px solid #1a1a1a;
    flex-shrink: 0;
}

.icon-btn {
    width: 44px; height: 44px;
    border-radius: 8px; border: none;
    background: #1a1a1a; color: #666;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; position: relative;
    transition: all 0.2s;
    -webkit-user-select: none; user-select: none;
    touch-action: manipulation;
    flex-shrink: 0;
}
.icon-btn:active { transform: scale(0.92); }
.icon-btn.active { background: #fff; color: #111; }
.icon-btn svg { width: 26px; height: 26px; }
.icon-btn .badge {
    position: absolute; bottom: 2px; right: 2px;
    font-size: 9px; font-weight: 700;
    color: inherit; line-height: 1;
}
.icon-btn.hidden { display: none; }

/* ── Content area (image + controls) ── */
.content {
    display: flex; flex-direction: column;
    flex: 1; overflow: hidden; min-height: 0;
}

/* ── Image area ── */
.image-wrap {
    position: relative; flex: 1; min-height: 0;
    background: #000;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
}
.image-wrap img.base-img {
    max-width: 100%; max-height: 100%;
    width: auto; height: auto;
    display: block; object-fit: contain;
}
.image-wrap.sono-view img.base-img {
    object-fit: cover;
}
/* Static/reference views use same contain fit as other views */
.layer-overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.15s ease;
    pointer-events: none;
}
.layer-overlay.visible { opacity: 1; }
.layer-overlay img {
    max-width: 100%; max-height: 100%;
    width: auto; height: auto; object-fit: contain;
}

/* ── Controls panel (portrait = bottom) ── */
.controls {
    flex-shrink: 0; max-height: 40vh;
    overflow-y: auto; -webkit-overflow-scrolling: touch;
    background: #0a0a0a; border-top: 1px solid #222;
}
.controls.hidden { display: none; }
.controls::-webkit-scrollbar { width: 4px; }
.controls::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

/* Toggle-all / Colour All / Labels button */
.toggle-all-btn {
    display: flex; align-items: center; justify-content: center;
    gap: 6px; width: 100%; padding: 7px 12px;
    background: #161616; border: none;
    border-bottom: 1px solid #1a1a1a;
    color: #bbb; font-size: 11px; font-weight: 700;
    letter-spacing: 0.8px; text-transform: uppercase;
    cursor: pointer; touch-action: manipulation;
}
.toggle-all-btn.active { color: #7ab5e8; background: #0d1f30; }
.toggle-all-btn .icon {
    width: 14px; height: 14px; border-radius: 50%;
    background: linear-gradient(135deg, #ffd700, #ff4444, #44ccff);
    opacity: 0.7;
}
.toggle-all-btn.active .icon { opacity: 1; }

/* Layer items */
.layer-item {
    display: flex; align-items: center;
    padding: 0 12px; min-height: 34px;
    border-bottom: 1px solid #111;
    cursor: pointer; transition: background 0.15s;
    touch-action: manipulation;
    -webkit-user-select: none; user-select: none;
    border-left: 3px solid transparent;
}
.layer-item:active { background: rgba(255,255,255,0.05); }
.layer-item.active { background: rgba(26,58,92,0.25); border-left-color: #2a5a8c; }

.layer-dot {
    width: 8px; height: 8px; border-radius: 50%;
    margin-right: 10px; flex-shrink: 0;
    transition: transform 0.15s, box-shadow 0.15s;
}
.layer-item.active .layer-dot {
    transform: scale(1.3);
    box-shadow: 0 0 6px var(--dot-color, #fff);
}

.layer-name {
    flex: 1; font-size: 13px; color: #999;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.layer-item.active .layer-name { color: #e0e0e0; font-weight: 500; }

.toggle-pip {
    width: 6px; height: 6px; border-radius: 50%;
    background: #333; margin-left: 8px; flex-shrink: 0;
    transition: all 0.15s;
}
.layer-item.active .toggle-pip { background: #4a9ade; box-shadow: 0 0 4px #4a9ade; }

/* Static view message */
.static-msg {
    padding: 16px; text-align: center;
    color: #555; font-size: 13px; font-style: italic;
}

/* ── Notes panel ── */
.notes-panel {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: #0a0a0a; overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    display: none;
}
.notes-panel.visible { display: block; }
.notes-panel::-webkit-scrollbar { width: 4px; }
.notes-panel::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
.notes-section {
    padding: 16px; border-bottom: 1px solid #1a1a1a;
}
.notes-section-title {
    font-size: 12px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.5px; margin-bottom: 8px; padding-bottom: 8px;
    border-bottom: 2px solid;
}
.notes-section-title.indication { border-color: #ddd; color: #ddd; }
.notes-section-title.positioning { border-color: #44aaff; color: #44aaff; }
.notes-section-title.volume { border-color: #44aaff; color: #44aaff; }
.notes-section-title.side-effects { border-color: #ff4444; color: #ff4444; }
.notes-section-title.complications { border-color: #ff4444; color: #ff4444; }
.notes-section-text {
    font-size: 13px; color: #999; line-height: 1.5;
}
.notes-unavailable {
    padding: 16px; text-align: center;
    font-size: 13px; color: #555; font-style: italic;
}

/* ── Innervation grid ── */
.innervation-grid {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 8px; padding: 16px;
    overflow-y: auto; -webkit-overflow-scrolling: touch;
}
.innervation-item {
    aspect-ratio: 1;
    background: #1a1a1a; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    text-align: center; padding: 12px;
    border: 1px solid #222;
}
.innervation-item.placeholder {
    color: #666; font-size: 12px;
}
.innervation-placeholder {
    padding: 16px; text-align: center;
    font-size: 13px; color: #555; font-style: italic;
}
.innervation-related {
    flex-shrink: 0; max-height: 40vh;
    overflow-y: auto; -webkit-overflow-scrolling: touch;
    background: #0a0a0a; border-top: 1px solid #222;
}
.innervation-related-label {
    padding: 12px 16px;
    background: #161616; border-bottom: 1px solid #1a1a1a;
    font-size: 11px; font-weight: 700; color: #bbb;
    letter-spacing: 0.8px; text-transform: uppercase;
}
.innervation-related-item {
    padding: 12px 16px; border-bottom: 1px solid #1a1a1a;
    font-size: 13px; color: #ddd; cursor: pointer;
    transition: background 0.15s;
}
.innervation-related-item:active { background: rgba(255,255,255,0.05); }

/* ── Search UI ── */
.search-panel {
    display: flex; flex-direction: column;
    height: 100%;
}
.search-input-wrap {
    padding: 16px; border-bottom: 1px solid #1a1a1a;
    flex-shrink: 0;
}
.search-input-wrap input {
    width: 100%; padding: 10px 12px;
    background: #161616; border: 1px solid #222;
    color: #ddd; font-size: 14px; border-radius: 6px;
    font-family: inherit;
}
.search-input-wrap input::placeholder { color: #666; }
.search-results {
    flex: 1; overflow-y: auto;
    -webkit-overflow-scrolling: touch;
}
.search-results::-webkit-scrollbar { width: 4px; }
.search-results::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
.search-result-item {
    padding: 12px 16px; border-bottom: 1px solid #1a1a1a;
    cursor: pointer; transition: background 0.15s;
    touch-action: manipulation;
}
.search-result-item:active { background: rgba(255,255,255,0.05); }
.search-result-title {
    font-size: 14px; color: #ddd; font-weight: 500;
    margin-bottom: 4px;
}
.search-result-indication {
    font-size: 12px; color: #999;
}

/* ══════════════════════════════════════
   LANDSCAPE
   ══════════════════════════════════════ */
@media (orientation: landscape), (min-width: 768px) {
    .title-bar h1 { font-size: 15px; }
    .title-bar .sub { display: inline; }

    .main { flex-direction: row; }

    .icon-bar {
        flex-direction: column;
        justify-content: flex-start;
        padding: 8px 4px; gap: 4px;
        border-bottom: none;
        border-right: 1px solid #1a1a1a;
        width: 54px; overflow-y: auto;
    }
    .icon-btn { width: 42px; height: 42px; }

    .content { flex-direction: row; flex: 1; }
    .image-wrap { flex: 1; }
    .image-wrap.sono-view img.base-img {
        transform: scale(1.05);
    }
    .controls {
        width: 220px; max-height: none;
        border-top: none; border-left: 1px solid #222;
        flex-shrink: 0;
    }
}

@media (orientation: landscape) and (min-height: 500px), (min-width: 1024px) {
    .controls { width: 260px; }
}

@media (min-width: 1200px) {
    .icon-bar { width: 60px; }
    .icon-btn { width: 48px; height: 48px; }
    .icon-btn svg { width: 30px; height: 30px; }
    .controls { width: 300px; }
    .title-bar h1 { font-size: 18px; }
}

@media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
}
</style>
</head>

function getViewIcon(name) {
    const n = name.toLowerCase();
    if (n.includes('sono')) return VIEW_ICONS['sonoanatomy'];
    if (n.includes('diagram')) return VIEW_ICONS['diagram'];
    if (n.includes('probe')) return VIEW_ICONS['probe_position'];
    if (n.includes('reference')) return VIEW_ICONS['reference'];
    return VIEW_ICONS['sonoanatomy'];
}
function getViewBadge(name) {
    const m = name.match(/(\d+)$/);
    return m ? m[1] : '';
}

// ── Dot colours ──
function dotColor(name) {
    const n = name.toLowerCase();
    if (n.includes('colour all')) return 'linear-gradient(135deg, #ffd700, #ff4444, #44ccff)';
    if (n.includes('needle') || n === 'labels') return '#ffffff';
    if (n === 'la') return '#44dd88';
    if (n.includes('nerve') || n.includes('sympathe') || n.includes('vagus') || n.includes('phrenic'))
        return '#ffd700';
    if (n.includes('artery') || n.includes('scalene') || n.includes('muscle') || n.includes('longus')
        || n.includes('longissimus') || n.includes('scapulae') || n.includes('sternocleid')
        || n.includes('platysma') || n.includes('omohyoid') || n.includes('thyroid')
        || n.includes('cervical'))
        return '#ff4444';
    if (n.includes('vein') || n.includes('jugular')) return '#44aaff';
    if (n.includes('vertebra') || n.includes('transverse')) return '#999';
    return '#ff8844';
}

// Determine the "primary" first layer that the toggle-all button replaces
function getFirstLayerInfo(view) {
    if (!view.layers || view.layers.length === 0 || view.type === 'static') return null;
    const firstName = view.layers[0].name.toLowerCase();
    if (firstName === 'colour all') return { skipIndex: 0, buttonLabel: 'Colour All' };
    if (firstName === 'labels') return { skipIndex: 0, buttonLabel: 'Labels' };
    return null;
}

// ── Favourites management ──
function getFavourites() {
    try {
        return JSON.parse(localStorage.getItem('nba-favourites') || '[]');
    } catch {
        return [];
    }
}

function saveFavourites(favs) {
    localStorage.setItem('nba-favourites', JSON.stringify(favs));
}

function isFavourite(block_id) {
    return getFavourites().includes(block_id);
}

function toggleFavourite(block_id) {
    const favs = getFavourites();
    const idx = favs.indexOf(block_id);
    if (idx >= 0) {
        favs.splice(idx, 1);
    } else {
        favs.push(block_id);
    }
    saveFavourites(favs);
    updateFavouriteButtons();
    updateNavFavourites();
}

                row.innerHTML = `<span class="nav-item-text">\u2605 Favourites</span><span class="nav-item-arrow">\u203A</span>`;
                if (favCount > 0) {
                    row.onclick = () => { navCatIdx = ci; navLevel = 'sub'; renderNav(); };
                }
                list.appendChild(row);
                return;
            }

            // Regular menu items
            const row = document.createElement('div');
            row.className = 'nav-item';
            if (cat.items.length === 0) row.classList.add('disabled');
            row.innerHTML = `<span class="nav-item-text">${cat.name}</span><span class="nav-item-arrow">\u203A</span>`;
            if (cat.items.length > 0) {
                row.onclick = () => { navCatIdx = ci; navLevel = 'sub'; renderNav(); };
            }
            list.appendChild(row);
        });
    } else {
        const cat = MENU[navCatIdx];
        title.textContent = cat.name;
        back.classList.remove('hidden');
        back.onclick = () => { navLevel = 'main'; renderNav(); };

        // Favourites submenu: dynamic items from localStorage
        if (cat.name === 'Favourites') {
            const favs = getFavourites();
            const favBlocks = favs.map(id => BLOCKS.find(b => b.block_id === id)).filter(Boolean);
            if (favBlocks.length === 0) {
                const noFavs = document.createElement('div');
                noFavs.className = 'nav-item-no-favs';
                noFavs.textContent = 'No favourites yet';
                list.appendChild(noFavs);
            } else {
                favBlocks.forEach(block => {
                    const row = document.createElement('div');
                    const isCurrent = blockIndex[block.block_id] === blockIdx;
                    row.className = 'nav-item' + (isCurrent ? ' active-block' : '');

                    const textSpan = document.createElement('span');
                    textSpan.className = 'nav-item-text';
                    textSpan.textContent = block.block_name;
                    row.appendChild(textSpan);

                    // Star to remove from favourites
                    const starBtn = document.createElement('button');
                    starBtn.className = 'nav-item-star filled';
                    starBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="0.5">
                        <polygon points="12 2 15.09 10.26 24 10.5 18 16.9 20.29 25.5 12 20.73 3.71 25.5 6 16.9 0 10.5 8.91 10.26 12 2"/>
                    </svg>`;
                    starBtn.onclick = (e) => {
                        e.stopPropagation();
                        toggleFavourite(block.block_id);
                        renderNav(); // re-render to remove item
                    };
                    row.appendChild(starBtn);

                    const arrow = document.createElement('span');
                    arrow.className = 'nav-item-arrow';
                    arrow.textContent = '\u203A';
                    row.appendChild(arrow);

                    row.onclick = () => { loadBlock(blockIndex[block.block_id]); closeNav(); };
                    list.appendChild(row);
                });
            }
            return;
        }

        cat.items.forEach(item => {
            const row = document.createElement('div');
            const isAvailable = item.block_id && (item.block_id in blockIndex);
            const isSpecial = item.block_id && (item.block_id === 'search_surgery' || item.block_id === 'quiz_coming_soon' || item.block_id === 'consent_coming_soon');
            const isCurrent = isAvailable && blockIndex[item.block_id] === blockIdx;
            row.className = 'nav-item' + (isAvailable || isSpecial ? '' : ' disabled') + (isCurrent ? ' active-block' : '');

            const textSpan = document.createElement('span');
            textSpan.className = 'nav-item-text';
            textSpan.textContent = item.name;
            row.appendChild(textSpan);

            if (isAvailable || isSpecial) {
                const isFav = isAvailable && isFavourite(item.block_id);
                const starBtn = document.createElement('button');
                starBtn.className = 'nav-item-star' + (isFav ? ' filled' : '');
                starBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="0.5">
                    <polygon points="12 2 15.09 10.26 24 10.5 18 16.9 20.29 25.5 12 20.73 3.71 25.5 6 16.9 0 10.5 8.91 10.26 12 2"/>
                </svg>`;
                starBtn.onclick = (e) => {
                    e.stopPropagation();
                    if (isAvailable) {
                        toggleFavourite(item.block_id);
                        const isFavNow = isFavourite(item.block_id);
                        starBtn.classList.toggle('filled', isFavNow);
                    }
                };
                row.appendChild(starBtn);

                row.appendChild(document.createElement('span')).className = 'nav-item-arrow';
                row.lastChild.textContent = '\u203A';
                if (isAvailable) {
                    row.onclick = () => { loadBlock(blockIndex[item.block_id]); closeNav(); };
                } else if (isSpecial) {
                    row.onclick = () => { loadSpecialView(item.block_id); closeNav(); };
                }
            }
            list.appendChild(row);
        });
    }
}

function updateNavFavourites() {
    if (navLevel === 'main') renderNav();
}

function updateFavouriteButtons() {
    const block = BLOCKS[blockIdx];
    const favBtn = document.getElementById('favBtn');
    if (favBtn && !favBtn.classList.contains('hidden')) {
        favBtn.classList.toggle('active', isFavourite(block.block_id));
    }
}

// Hamburger menu
document.getElementById('menuBtn').onclick = openNav;
document.getElementById('navOverlay').onclick = (e) => {
    if (e.target === document.getElementById('navOverlay')) closeNav();
};

// ── Load block ──
function loadBlock(idx) {
    blockIdx = idx;
    viewIdx = 0;
    isMirrored = false;
    currentView = 'image';
    Object.keys(layerOn).forEach(k => delete layerOn[k]);
    const block = BLOCKS[blockIdx];
    document.getElementById('blockTitle').textContent = block.block_name || 'Nerve Block Atlas';
    document.getElementById('blockSub').textContent = 'Nerve Block Atlas';
    renderTitleBarButtons();
    renderIcons();
    switchView(0);
}

function loadSpecialView(viewId) {
    currentView = 'special';
    // Hide icon bar and controls for special views
    document.getElementById('iconBar').style.display = 'none';
    document.getElementById('controls').classList.add('hidden');

    if (viewId === 'search_surgery') {
        document.getElementById('blockTitle').textContent = 'Find Block by Surgery';
        renderTitleBarButtons();
        renderSearchUI();
    } else if (viewId === 'quiz_coming_soon') {
        document.getElementById('blockTitle').textContent = 'Quick Quiz';
        renderTitleBarButtons();
        renderPlaceholder('Quick Quiz coming soon');
    } else if (viewId === 'consent_coming_soon') {
        document.getElementById('blockTitle').textContent = 'Consent & Risks';
        renderTitleBarButtons();
        renderPlaceholder('Consent & Risks coming soon');
    }
}

// ── Init ──
function init() {
    loadBlock(0);
}

// ── Title bar buttons ──
function renderTitleBarButtons() {
    const block = BLOCKS[blockIdx];
    const favBtn = document.getElementById('favBtn');
    const mirrorBtn = document.getElementById('mirrorBtn');

    // Show favourite button for all block views (image, notes, innervation)
    if ((currentView === 'image' || currentView === 'notes' || currentView === 'innervation') && block) {
        favBtn.classList.remove('hidden');
        favBtn.classList.toggle('active', isFavourite(block.block_id));
        favBtn.onclick = () => {
            toggleFavourite(block.block_id);
        };
    } else {
        favBtn.classList.add('hidden');
    }

    // Show mirror button only for sono views
    if (currentView === 'image' && viewIdx < BLOCKS[blockIdx].views.length) {
        const view = BLOCKS[blockIdx].views[viewIdx];
        const isSono = view.name.toLowerCase().includes('sono');
        if (isSono) {
            mirrorBtn.classList.remove('hidden');
            mirrorBtn.classList.toggle('active', isMirrored);
            mirrorBtn.onclick = () => {
                isMirrored = !isMirrored;
                mirrorBtn.classList.toggle('active', isMirrored);
                applyMirrorTransform();
            };
        } else {
            mirrorBtn.classList.add('hidden');
        }
    } else {
        mirrorBtn.classList.add('hidden');
    }
}

function applyMirrorTransform() {
    const imageWrap = document.getElementById('imageWrap');
    if (isMirrored) {
        imageWrap.style.transform = 'scaleX(-1)';
    } else {
        imageWrap.style.transform = '';
    }
}

// ── Icon bar ──
function renderIcons() {
    const el = document.getElementById('iconBar');
    el.innerHTML = '';
    const views = BLOCKS[blockIdx].views;
    const block = BLOCKS[blockIdx];

    // Hide icon bar if only one view
    if (views.length <= 1 && !block.notes && !block.innervation) {
        el.style.display = 'none';
        return;
    } else {
        el.style.display = '';
    }

    // View icons
    views.forEach((v, i) => {
        const btn = document.createElement('button');
        btn.className = 'icon-btn' + (i === viewIdx && currentView === 'image' ? ' active' : '');
        btn.title = v.name;
        btn.innerHTML = getViewIcon(v.name);
        const badge = getViewBadge(v.name);
        if (badge) {
            const b = document.createElement('span');
            b.className = 'badge';
            b.textContent = badge;
            btn.appendChild(b);
        }
        btn.onclick = () => switchView(i);
        el.appendChild(btn);
    });

    // Notes icon
    if (block.notes) {
        const notesBtn = document.createElement('button');
        notesBtn.className = 'icon-btn' + (currentView === 'notes' ? ' active' : '');
        notesBtn.title = 'Notes';
        notesBtn.innerHTML = VIEW_ICONS['notes'];
        notesBtn.onclick = () => switchToNotes();
        el.appendChild(notesBtn);
    }

    // Innervation icon
    if (block.innervation) {
        const innervBtn = document.createElement('button');
        innervBtn.className = 'icon-btn' + (currentView === 'innervation' ? ' active' : '');
        innervBtn.title = 'Innervation';
        innervBtn.innerHTML = VIEW_ICONS['innervation'];
        innervBtn.onclick = () => switchToInnervation();
        el.appendChild(innervBtn);
    }
}

// ── Switch view ──
function switchView(i) {
    viewIdx = i;
    isMirrored = false;
    currentView = 'image';
    Object.keys(layerOn).forEach(k => delete layerOn[k]);
    renderTitleBarButtons();
    renderIcons();
    renderImage();
    renderControls();
}

function switchToNotes() {
    currentView = 'notes';
    isMirrored = false;
    renderTitleBarButtons();
    renderIcons();
    renderImage();
    renderControls();
}

function switchToInnervation() {
    currentView = 'innervation';
    isMirrored = false;
    renderTitleBarButtons();
    renderIcons();
    renderImage();
    renderControls();
}

// ── Render image + overlays ──
function renderImage() {
    const wrap = document.getElementById('imageWrap');
    wrap.innerHTML = '';
    wrap.style.transform = '';

    if (currentView === 'notes') {
        const block = BLOCKS[blockIdx];
        const panel = document.createElement('div');
        panel.className = 'notes-panel visible';

        if (!block.notes) {
            panel.innerHTML = '<div class="notes-unavailable">Notes not yet available</div>';
        } else {
            const notes = block.notes;
            ['indication', 'positioning', 'volume', 'side_effects', 'complications'].forEach(key => {
                if (notes[key]) {
                    const section = document.createElement('div');
                    section.className = 'notes-section';
                    const title = document.createElement('div');
                    title.className = 'notes-section-title ' + key;
                    title.textContent = key.replace(/_/g, ' ').toUpperCase();
                    section.appendChild(title);
                    const text = document.createElement('div');
                    text.className = 'notes-section-text';
                    text.textContent = notes[key];
                    section.appendChild(text);
                    panel.appendChild(section);
                }
            });
        }
        wrap.appendChild(panel);
        return;
    }

    if (currentView === 'innervation') {
        const block = BLOCKS[blockIdx];
        if (!block.innervation || !block.innervation.images) {
            const placeholder = document.createElement('div');
            placeholder.className = 'innervation-placeholder';
            placeholder.textContent = 'Innervation images coming soon';
            wrap.appendChild(placeholder);
        } else {
            const grid = document.createElement('div');
            grid.className = 'innervation-grid';
            const items = ['Cutaneous (Anterior)', 'Motor (Anterior)', 'Osseous (Anterior)',
                          'Cutaneous (Posterior)', 'Motor (Posterior)', 'Osseous (Posterior)'];
            items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'innervation-item placeholder';
                div.textContent = item;
                grid.appendChild(div);
            });
            wrap.appendChild(grid);
        }
        return;
    }

    if (currentView === 'search' || currentView === 'special') {
        // Search/placeholder UI is rendered separately
        return;
    }

    // Image view (default)
    const view = BLOCKS[blockIdx].views[viewIdx];
    const isStatic = view.type === 'static' || (!view.layers || view.layers.length === 0);
    const isSono = view.name.toLowerCase().includes('sono');

    wrap.classList.toggle('static-view', isStatic);
    wrap.classList.toggle('sono-view', isSono && !isStatic);

    const base = document.createElement('img');
    base.className = 'base-img';
    base.src = view.base;
    base.alt = view.name;
    wrap.appendChild(base);

    if (view.type !== 'static' && view.layers) {
        view.layers.forEach((layer, li) => {
            const div = document.createElement('div');
            div.className = 'layer-overlay';
            div.id = 'lo-' + li;
            const img = document.createElement('img');
            img.src = layer.filename;
            img.alt = layer.name;
            img.loading = 'lazy';
            div.appendChild(img);
            wrap.appendChild(div);
        });
    }

    applyMirrorTransform();
}

// ── Render controls ──
function renderControls() {
    const el = document.getElementById('controls');
    el.innerHTML = '';

    if (currentView === 'notes') {
        el.classList.add('hidden');
        return;
    }

    if (currentView === 'innervation') {
        const block = BLOCKS[blockIdx];
        if (block.innervation && block.innervation.related_blocks && block.innervation.related_blocks.length > 0) {
            el.classList.remove('hidden');
            const label = document.createElement('div');
            label.className = 'innervation-related-label';
            label.textContent = 'Related Blocks';
            el.appendChild(label);

            block.innervation.related_blocks.forEach(blockName => {
                const item = document.createElement('div');
                item.className = 'innervation-related-item';
                item.textContent = blockName;
                el.appendChild(item);
            });
        } else {
            el.classList.add('hidden');
        }
        return;
    }

    if (currentView === 'search' || currentView === 'special') {
        el.classList.add('hidden');
        return;
    }

    const view = BLOCKS[blockIdx].views[viewIdx];
    if (view.type === 'static' || !view.layers || view.layers.length === 0) {
        el.classList.add('hidden');
        return;
    }
    el.classList.remove('hidden');

    const info = getFirstLayerInfo(view);
    const allBtn = document.createElement('button');
    allBtn.className = 'toggle-all-btn';
    const btnLabel = info ? info.buttonLabel : 'Show All';
    allBtn.innerHTML = '<span class="icon"></span> ' + btnLabel;
    allBtn.onclick = toggleAll;
    allBtn.id = 'toggleAllBtn';
    el.appendChild(allBtn);

    view.layers.forEach((layer, li) => {
        if (info && li === info.skipIndex) return;

        const row = document.createElement('div');
        row.className = 'layer-item';
        row.id = 'ctrl-' + li;

        const dot = document.createElement('div');
        dot.className = 'layer-dot';
        const c = dotColor(layer.name);
        dot.style.setProperty('--dot-color', c);
        dot.style.background = c;
        row.appendChild(dot);

        const name = document.createElement('div');
        name.className = 'layer-name';
        name.textContent = layer.name;
        row.appendChild(name);

        const pip = document.createElement('div');
        pip.className = 'toggle-pip';
        row.appendChild(pip);

        row.onclick = () => toggleLayer(li);
        el.appendChild(row);
    });
}

// ── Toggle layer ──
function toggleLayer(li) {
    layerOn[li] = !layerOn[li];
    syncUI();
}

// ── Toggle all ──
function toggleAll() {
    const view = BLOCKS[blockIdx].views[viewIdx];
    const count = view.layers ? view.layers.length : 0;
    const allOn = Object.keys(layerOn).filter(k => layerOn[k]).length === count;
    for (let i = 0; i < count; i++) layerOn[i] = !allOn;
    syncUI();
}

// ── Sync UI state ──
function syncUI() {
    const view = BLOCKS[blockIdx].views[viewIdx];
    if (!view.layers) return;
    const count = view.layers.length;
    const info = getFirstLayerInfo(view);
    let onCount = 0;

    view.layers.forEach((_, li) => {
        const on = !!layerOn[li];
        if (on) onCount++;
        const overlay = document.getElementById('lo-' + li);
        if (overlay) overlay.classList.toggle('visible', on);
        const ctrl = document.getElementById('ctrl-' + li);
        if (ctrl) ctrl.classList.toggle('active', on);
    });

    const allBtn = document.getElementById('toggleAllBtn');
    if (allBtn) {
        const allOn = onCount === count;
        allBtn.classList.toggle('active', allOn);
        const btnLabel = info ? info.buttonLabel : (allOn ? 'Hide All' : 'Show All');
        allBtn.innerHTML = '<span class="icon"></span> ' + btnLabel;
    }
}

// ── Search UI ──
function renderSearchUI() {
    const wrap = document.getElementById('imageWrap');
    wrap.innerHTML = '';
    wrap.style.transform = '';
    wrap.classList.remove('sono-view', 'static-view');

    const panel = document.createElement('div');
    panel.className = 'search-panel';

    const inputWrap = document.createElement('div');
    inputWrap.className = 'search-input-wrap';
    const input = document.createElement('input');
    input.type = 'text';
    input.placeholder = 'Search surgery or indication...';
    inputWrap.appendChild(input);
    panel.appendChild(inputWrap);

    const resultsDiv = document.createElement('div');
    resultsDiv.className = 'search-results';
    panel.appendChild(resultsDiv);

    function updateResults(query) {
        resultsDiv.innerHTML = '';
        if (!query.trim()) {
            resultsDiv.innerHTML = '<div style="padding:16px; text-align:center; color:#555; font-size:13px;">Type to search...</div>';
            return;
        }

        const q = query.toLowerCase();
        const results = BLOCKS.filter(block => {
            if (!block.notes || !block.notes.indication) return false;
            return block.notes.indication.toLowerCase().includes(q) ||
                   block.block_name.toLowerCase().includes(q);
        });

        if (results.length === 0) {
            resultsDiv.innerHTML = '<div style="padding:16px; text-align:center; color:#555; font-size:13px;">No blocks found</div>';
            return;
        }

        results.forEach(block => {
            const item = document.createElement('div');
            item.className = 'search-result-item';
            const title = document.createElement('div');
            title.className = 'search-result-title';
            title.textContent = block.block_name;
            item.appendChild(title);
            const indication = document.createElement('div');
            indication.className = 'search-result-indication';
            indication.textContent = block.notes.indication;
            item.appendChild(indication);
            item.onclick = () => {
                loadBlock(blockIndex[block.block_id]);
                closeNav();
            };
            resultsDiv.appendChild(item);
        });
    }

    input.oninput = () => updateResults(input.value);
    updateResults('');

    wrap.appendChild(panel);
}

function renderPlaceholder(message) {
    const wrap = document.getElementById('imageWrap');
    wrap.innerHTML = '';
    wrap.style.transform = '';
    wrap.classList.remove('sono-view', 'static-view');
    const placeholder = document.createElement('div');
    placeholder.className = 'notes-unavailable';
    placeholder.style.cssText = 'position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80%; text-align: center;';
    placeholder.textContent = message;
    wrap.appendChild(placeholder);
}

init();
</script>
</body>
